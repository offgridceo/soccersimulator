<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Interactive Soccer Sandbox v3</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        h1 { margin-bottom: 5px; font-weight: 400; font-size: 24px; }
        p { color: #aaa; margin: 0 0 15px 0; font-size: 14px; }
        #controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: #25252b;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; text-transform: uppercase; color: #bbb; letter-spacing: 1px; font-weight: bold; }
        input {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            width: 70px;
            text-align: center;
            font-size: 14px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            height: 34px;
        }
        #simulateBtn { background-color: #2ecc71; color: #fff; }
        #simulateBtn:hover { background-color: #27ae60; }
        #simulateBtn.active { background-color: #e74c3c; }
        #resetBtn { background-color: #7f8c8d; color: #fff; }
        #resetBtn:hover { background-color: #95a5a6; }
        #canvas-container {
            position: relative;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas { display: block; background-color: #27ae60; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #scoreboard {
            font-size: 18px;
            font-weight: bold;
            background: #111;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <h1>Tactical Soccer Sandbox</h1>
    <p>Type structures below OR click and drag any player chip manually to alter spacing.</p>

    <div id="controls">
        <div class="input-group">
            <label for="blueFormation">Blue Team</label>
            <input type="text" id="blueFormation" value="4-3-3">
        </div>
        <div class="input-group">
            <label for="redFormation">Red Team</label>
            <input type="text" id="redFormation" value="4-4-2">
        </div>
        <button id="simulateBtn">Simulate Match</button>
        <button id="resetBtn">Reset All</button>
        <div id="scoreboard">Blue 0 - 0 Red</div>
    </div>

    <div id="canvas-container">
        <canvas id="pitch" width="460" height="660"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pitch');
        const ctx = canvas.getContext('2d');
        const simulateBtn = document.getElementById('simulateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scoreboard = document.getElementById('scoreboard');

        let isSimulating = false;
        let animationFrameId;
        let blueScore = 0;
        let redScore = 0;
        let lastScored = null;
        
        // Dragging State Tracking Variables
        let selectedPlayer = null;
        let isDragging = false;

        const pitch = {
            width: canvas.width,
            height: canvas.height,
            pad: 25,
            lineColor: 'rgba(255,255,255,0.7)',
            grassColor: '#27ae60',
            grassStreak: '#219653'
        };

        const PLAYER_RADIUS = 11;
        const BALL_RADIUS = 5.5;

        class Player {
            constructor(team, role, homeX, homeY, id, totalInLine, indexInLine) {
                this.team = team;        
                this.role = role;        
                this.id = id;
                this.homeX = homeX;      
                this.homeY = homeY;      
                this.x = homeX;
                this.y = homeY;
                
                this.lane = 'C'; 
                if (totalInLine > 1) {
                    const pct = indexInLine / (totalInLine - 1);
                    if (pct <= 0.3) this.lane = 'L';
                    else if (pct >= 0.7) this.lane = 'R';
                }

                this.speed = 2.5; 
                this.vX = 0;
                this.vY = 0;
                this.cooldown = 0; 
            }

            update(ball, allPlayers) {
                if (this.cooldown > 0) this.cooldown--;
                if (selectedPlayer === this) return; // Freeze dynamic AI logic calculation if being dragged manually

                const teamInPossession = ball.controllingPlayer ? ball.controllingPlayer.team : ball.lastPossessionTeam;
                const iHaveBall = ball.controllingPlayer === this;
                const opponentGoalY = this.team === 'blue' ? pitch.pad : pitch.height - pitch.pad;
                
                let targetX = this.homeX;
                let targetY = this.homeY;
                const distToBall = Math.hypot(ball.x - this.x, ball.y - this.y);

                if (iHaveBall) {
                    // 1. BALL CARRIER INDEPENDENT THINKING TREE
                    const distToGoal = Math.hypot(pitch.width/2 - this.x, opponentGoalY - this.y);

                    // A. Shoot if within shooting distance window
                    if (distToGoal < 180) {
                        this.shoot(ball);
                        return;
                    }

                    // B. Systematically look to execute a smart tactical pass
                    let passTarget = this.findSmartPass(allPlayers);
                    if (passTarget) {
                        this.pass(ball, passTarget);
                        return;
                    }

                    // C. Dribble directly toward opponent territory if passing lanes are blocked
                    const dirY = this.team === 'blue' ? -1 : 1;
                    targetY = this.y + dirY * 40;
                    targetX = this.x + (pitch.width/2 - this.x) * 0.15; 

                } else {
                    // 2. OFF-BALL COMBAT & TACTICAL STATE MACHINE
                    if (teamInPossession === this.team) {
                        // OFF-BALL ATTACKING STATE: Shift forward relative to ball location, spread out
                        const progress = (this.team === 'blue') ? (ball.y - pitch.height) * 0.35 : (ball.y * 0.35);
                        targetY = this.homeY + progress;
                        
                        if (this.lane === 'L') targetX = this.homeX - 35;
                        else if (this.lane === 'R') targetX = this.homeX + 35;
                        else targetX = this.homeX + (ball.x - pitch.width/2) * 0.25;

                        if (this.role === 'D') targetY = this.homeY + (ball.y - this.homeY) * 0.2; // Guard line safety anchoring
                    } else {
                        // DEFENSIVE COMPRESSION STATE: Close ranks, track runners
                        targetY = this.homeY + (ball.y - this.homeY) * 0.55;
                        targetX = this.homeX + (ball.x - pitch.width/2) * 0.2;

                        if (this.role === 'G') {
                            targetX = pitch.width / 2 + (ball.x - pitch.width / 2) * 0.2;
                            targetY = this.homeY;
                        }
                    }

                    // 3. AGGRESSIVE LOOSE BALL SCRAMBLING Instinct
                    // If no one controls the ball or opponent is close, register interest based on distance threshold matrix
                    let claimThreshold = 140;
                    if (!ball.controllingPlayer) claimThreshold = 220; // Hunt down loose rebounds aggressively

                    if (distToBall < claimThreshold && this.role !== 'G') {
                        const closestTeammate = allPlayers
                            .filter(p => p.team === this.team && p.role !== 'G')
                            .reduce((closest, p) => Math.hypot(ball.x - p.x, ball.y - p.y) < Math.hypot(ball.x - closest.x, ball.y - closest.y) ? p : closest, this);

                        if (closestTeammate === this || distToBall < 45) {
                            targetX = ball.x;
                            targetY = ball.y;
                        }
                    }
                }

                // Smooth Linear Transformations
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dDist = Math.hypot(dx, dy);

                if (dDist > 1) {
                    this.vX = (dx / dDist) * this.speed;
                    this.vY = (dy / dDist) * this.speed;
                } else {
                    this.vX *= 0.1;
                    this.vY *= 0.1;
                }

                this.x += this.vX;
                this.y += this.vY;

                // Restrict crossline field spilling borders
                this.x = Math.max(pitch.pad + 10, Math.min(pitch.width - pitch.pad - 10, this.x));
                this.y = Math.max(pitch.pad + 10, Math.min(pitch.height - pitch.pad - 10, this.y));

                // Process active interception claim collision frames
                if (!ball.controllingPlayer && distToBall < PLAYER_RADIUS + BALL_RADIUS && this.cooldown === 0) {
                    ball.controllingPlayer = this;
                    ball.lastPossessionTeam = this.team;
                }
            }

            findSmartPass(allPlayers) {
                let teammates = allPlayers.filter(p => p.team === this.team && p !== this);
                let bestTarget = null;
                let highestScore = -Infinity;

                teammates.forEach(p => {
                    const dist = Math.hypot(p.x - this.x, p.y - this.y);
                    
                    if (dist > 45 && dist < 250) {
                        const forwardProgress = this.team === 'blue' ? (this.y - p.y) : (p.y - this.y);
                        
                        // Base calculation scoring metrics
                        let score = forwardProgress * 2.5; // Reward playing forward paths
                        
                        // Tactical Recycling: If deep inside opponent territory, reward passing BACK to completely open players to reset
                        if (forwardProgress < 0) {
                            score += 15; 
                        }

                        // Ray-casting intercept danger evaluation lines
                        let opponents = allPlayers.filter(o => o.team !== this.team);
                        let dangerousPath = false;
                        let safetyMargin = 32; // Intercept shield calculation radius

                        opponents.forEach(o => {
                            const oDist = distToSegment({x: o.x, y: o.y}, {x: this.x, y: this.y}, {x: p.x, y: p.y});
                            if (oDist < safetyMargin) dangerousPath = true;
                        });

                        // Reward targets situated away from crowding clusters
                        let surroundingOpponents = opponents.filter(o => Math.hypot(o.x - p.x, o.y - p.y) < 60).length;
                        score -= surroundingOpponents * 12;

                        if (!dangerousPath && score > highestScore) {
                            highestScore = score;
                            bestTarget = p;
                        }
                    }
                });
                return bestTarget;
            }

            pass(ball, targetPlayer) {
                ball.controllingPlayer = null;
                const dx = targetPlayer.x - this.x;
                const dy = targetPlayer.y - this.y;
                const dist = Math.hypot(dx, dy);
                
                ball.vX = (dx / dist) * 8.0; // Crisp pass velocity acceleration
                ball.vY = (dy / dist) * 8.0;
                
                this.cooldown = 35; // Lock retention loops
                targetPlayer.cooldown = 4;
            }

            shoot(ball) {
                ball.controllingPlayer = null;
                const targetGoalX = pitch.width / 2 + (Math.random() * 34 - 17);
                const targetGoalY = this.team === 'blue' ? pitch.pad : pitch.height - pitch.pad;
                
                const dx = targetGoalX - this.x;
                const dy = targetGoalY - this.y;
                const dist = Math.hypot(dx, dy);

                ball.vX = (dx / dist) * 11.5;
                ball.vY = (dy / dist) * 11.5;
                this.cooldown = 50;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, PLAYER_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = this.team === 'blue' ? '#2980b9' : '#c0392b';
                ctx.fill();
                ctx.strokeStyle = selectedPlayer === this ? '#f1c40f' : '#fff'; // Golden frame indicator if dragging chip
                ctx.lineWidth = selectedPlayer === this ? 3 : 1.5;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.role + this.lane, this.x, this.y);
            }
        }

        class Ball {
            constructor() { 
                this.reset();
                this.stuckTimer = 0; 
                this.lastX = 0;
                this.lastY = 0;
            }
            reset() {
                this.x = pitch.width / 2;
                this.y = pitch.height / 2;
                this.vX = 0;
                this.vY = 0;
                this.controllingPlayer = null;
                this.lastPossessionTeam = lastScored === 'blue' ? 'red' : 'blue';
            }
            update() {
                if (this.controllingPlayer) {
                    const offset = this.controllingPlayer.team === 'blue' ? -9 : 9;
                    this.x = this.controllingPlayer.x;
                    this.y = this.controllingPlayer.y + offset;
                    this.vX = 0;
                    this.vY = 0;
                    this.stuckTimer = 0; 
                } else {
                    this.x += this.vX;
                    this.y += this.vY;
                    this.vX *= 0.972; // grass kinetic drag coefficients
                    this.vY *= 0.972;

                    // Corner / Wall Jam Anti-Freeze calculations
                    let movementDelta = Math.hypot(this.x - this.lastX, this.y - this.lastY);
                    if (movementDelta < 0.3) {
                        this.stuckTimer++;
                    } else {
                        this.stuckTimer = 0;
                    }

                    // Force clearance if frozen in corner for > 45 frames
                    if (this.stuckTimer > 45) {
                        this.vX = (Math.random() * 6 - 3);
                        this.vY = this.y < pitch.height/2 ? 4 : -4; // Clear downward or upward toward pitch center
                        this.stuckTimer = 0;
                    }

                    this.lastX = this.x;
                    this.lastY = this.y;

                    // Perimeter collision calculations
                    if (this.x <= pitch.pad + BALL_RADIUS || this.x >= pitch.width - pitch.pad - BALL_RADIUS) {
                        this.vX *= -1;
                        this.x = this.x <= pitch.pad + BALL_RADIUS ? pitch.pad + BALL_RADIUS : pitch.width - pitch.pad - BALL_RADIUS;
                    }

                    if (this.y <= pitch.pad || this.y >= pitch.height - pitch.pad) {
                        const goalLeft = pitch.width / 2 - 45;
                        const goalRight = pitch.width / 2 + 45;

                        if (this.x > goalLeft && this.x < goalRight) {
                            if (this.y <= pitch.pad) blueScore++;
                            else redScore++;
                            lastScored = this.y <= pitch.pad ? 'blue' : 'red';
                            updateScoreboard();
                            resetPositions();
                        } else {
                            // Deflect loose ball back into gameplay lanes instead of stopping action lines
                            this.vY *= -0.8;
                            this.vX += (Math.random() * 4 - 2);
                            this.y = this.y <= pitch.pad ? pitch.pad + 6 : pitch.height - pitch.pad - 6;
                        }
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        let players = [];
        const ball = new Ball();

        // Mathematical coordinate tracking vectors
        function sqr(x) { return x * x; }
        function dist2(v, w) { return sqr(v.x - w.x) + sqr(v.y - w.y); }
        function distToSegmentSquared(p, v, w) {
            let l2 = dist2(v, w);
            if (l2 == 0) return dist2(p, v);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return dist2(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
        }
        function distToSegment(p, v, w) { return Math.sqrt(distToSegmentSquared(p, v, w)); }

        function buildTeamFromFormation(team, formationString) {
            const teamPlayers = [];
            const parts = formationString.split('-').map(Number);
            const totalOutfield = parts.reduce((a, b) => a + b, 0);

            if (totalOutfield !== 10 || parts.some(isNaN)) {
                alert(`Invalid structure format: "${formationString}". Fields must add up to exactly 10 (e.g., 4-3-3, 3-5-2).`);
                return null;
            }

            const isBlue = team === 'blue';
            const usableHeight = (pitch.height / 2) - pitch.pad - 50;
            
            const gkY = isBlue ? pitch.height - pitch.pad - 20 : pitch.pad + 20;
            teamPlayers.push(new Player(team, 'G', pitch.width / 2, gkY, 1, 1, 0));

            let currentId = 2;
            parts.forEach((lineCount, lineIndex) => {
                let progressFraction = lineIndex / (parts.length - 1);
                let rowY;
                if (isBlue) {
                    rowY = (pitch.height / 2) + 50 + (1 - progressFraction) * usableHeight;
                } else {
                    rowY = pitch.pad + 50 + progressFraction * usableHeight;
                }

                let role = 'M';
                if (lineIndex === 0) role = 'D';
                else if (lineIndex === parts.length - 1) role = 'A';

                for (let i = 0; i < lineCount; i++) {
                    let horizontalFraction = lineCount === 1 ? 0.5 : i / (lineCount - 1);
                    let paddingX = 55; 
                    let rowX = paddingX + horizontalFraction * (pitch.width - paddingX * 2);

                    teamPlayers.push(new Player(team, role, rowX, rowY, currentId++, lineCount, i));
                }
            });

            return teamPlayers;
        }

        function parseFormations() {
            const blueStr = document.getElementById('blueFormation').value.trim();
            const redStr = document.getElementById('redFormation').value.trim();
            const blueSet = buildTeamFromFormation('blue', blueStr);
            const redSet = buildTeamFromFormation('red', redStr);
            if (blueSet && redSet) {
                players = [...blueSet, ...redSet];
                ball.reset();
            }
        }

        function resetPositions() {
            ball.reset();
            const blueStr = document.getElementById('blueFormation').value.trim();
            const redStr = document.getElementById('redFormation').value.trim();
            const blueSet = buildTeamFromFormation('blue', blueStr);
            const redSet = buildTeamFromFormation('red', redStr);
            if (blueSet && redSet) players = [...blueSet, ...redSet];
        }

        function updateScoreboard() {
            scoreboard.innerText = `Blue ${blueScore} - ${redScore} Red`;
        }

        // MOUSE / TOUCH INTERACTION LISTENER HANDLING FOR CLICK-AND-DRAG MANDATES
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) * (canvas.width / rect.width),
                y: (evt.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener('mousedown', (evt) => {
            const pos = getMousePos(evt);
            // Search coordinates array to detect intersection with player chips
            for (let p of players) {
                if (Math.hypot(p.x - pos.x, p.y - pos.y) < PLAYER_RADIUS + 5) {
                    selectedPlayer = p;
                    isDragging = true;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (evt) => {
            if (!isDragging || !selectedPlayer) return;
            const pos = getMousePos(evt);
            
            // Re-assign chip base anchors to drag location coordinates
            selectedPlayer.x = Math.max(pitch.pad, Math.min(pitch.width - pitch.pad, pos.x));
            selectedPlayer.y = Math.max(pitch.pad, Math.min(pitch.height - pitch.pad, pos.y));
            selectedPlayer.homeX = selectedPlayer.x;
            selectedPlayer.homeY = selectedPlayer.y;

            // If updating setup manually while paused, force immediate visual update loop
            if (!isSimulating) {
                ctx.clearRect(0, 0, pitch.width, pitch.height);
                drawPitch();
                players.forEach(p => p.draw());
                ball.draw();
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            selectedPlayer = null;
        });

        function drawPitch() {
            ctx.fillStyle = pitch.grassColor;
            ctx.fillRect(0, 0, pitch.width, pitch.height);
            ctx.fillStyle = pitch.grassStreak;
            for (let i = pitch.pad; i < pitch.height - pitch.pad; i += 60) {
                if ((i / 60) % 2 === 0) {
                    ctx.fillRect(pitch.pad, i, pitch.width - pitch.pad * 2, Math.min(30, pitch.height - pitch.pad - i));
                }
            }
            ctx.strokeStyle = pitch.lineColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(pitch.pad, pitch.pad, pitch.width - pitch.pad * 2, pitch.height - pitch.pad * 2);
            ctx.beginPath();
            ctx.moveTo(pitch.pad, pitch.height / 2);
            ctx.lineTo(pitch.width - pitch.pad, pitch.height / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(pitch.width / 2, pitch.height / 2, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeRect(pitch.width / 2 - 80, pitch.pad, 160, 70);
            ctx.strokeRect(pitch.width / 2 - 35, pitch.pad, 70, 25);
            ctx.strokeRect(pitch.width / 2 - 80, pitch.height - pitch.pad - 70, 160, 70);
            ctx.strokeRect(pitch.width / 2 - 35, pitch.height - pitch.pad - 25, 70, 25);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.strokeRect(pitch.width / 2 - 25, pitch.pad - 8, 50, 8);
            ctx.strokeRect(pitch.width / 2 - 25, pitch.height - pitch.pad, 50, 8);
        }

        function simulationStep() {
            if (!isSimulating) return;
            players.forEach(p => p.update(ball, players));
            ball.update();
            ctx.clearRect(0, 0, pitch.width, pitch.height);
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
            animationFrameId = requestAnimationFrame(simulationStep);
        }

        simulateBtn.addEventListener('click', () => {
            if (!isSimulating) {
                isSimulating = true;
                simulateBtn.innerText = "Pause Simulation";
                simulateBtn.classList.add('active');
                simulationStep();
            } else {
                isSimulating = false;
                simulateBtn.innerText = "Simulate Match";
                simulateBtn.classList.remove('active');
                cancelAnimationFrame(animationFrameId);
            }
        });

        resetBtn.addEventListener('click', () => {
            isSimulating = false;
            simulateBtn.innerText = "Simulate Match";
            simulateBtn.classList.remove('active');
            cancelAnimationFrame(animationFrameId);
            blueScore = 0;
            redScore = 0;
            lastScored = null;
            updateScoreboard();
            parseFormations();
            ctx.clearRect(0, 0, pitch.width, pitch.height);
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
        });

        window.onload = () => {
            parseFormations();
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
        };
    </script>
</body>
</html>
