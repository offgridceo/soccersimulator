<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Tactical Soccer Simulator v2</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; font-weight: 400; }
        #controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: #2a2a35;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            width: 80px;
            text-align: center;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            height: 38px;
            margin-top: 15px;
        }
        #simulateBtn { background-color: #2ecc71; color: #fff; }
        #simulateBtn:hover { background-color: #27ae60; }
        #simulateBtn.active { background-color: #e74c3c; }
        #resetBtn { background-color: #7f8c8d; color: #fff; }
        #resetBtn:hover { background-color: #95a5a6; }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas { display: block; background-color: #27ae60; }
        #scoreboard {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            background: #2a2a35;
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>Tactical Stress-Test Simulator (Positional AI)</h1>

    <div id="controls">
        <div class="input-group">
            <label for="blueFormation">Blue Team</label>
            <input type="text" id="blueFormation" value="4-3-3">
        </div>
        <div class="input-group">
            <label for="redFormation">Red Team</label>
            <input type="text" id="redFormation" value="4-4-2">
        </div>
        <button id="simulateBtn">Simulate Match</button>
        <button id="resetBtn">Reset</button>
        <div id="scoreboard">Blue 0 - 0 Red</div>
    </div>

    <div id="canvas-container">
        <canvas id="pitch" width="450" height="650"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pitch');
        const ctx = canvas.getContext('2d');
        const simulateBtn = document.getElementById('simulateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scoreboard = document.getElementById('scoreboard');

        let isSimulating = false;
        let animationFrameId;
        let blueScore = 0;
        let redScore = 0;
        let lastScored = null;

        const pitch = {
            width: canvas.width,
            height: canvas.height,
            pad: 25,
            lineColor: 'rgba(255,255,255,0.7)',
            grassColor: '#2d8a4e',
            grassStreak: '#278045'
        };

        const PLAYER_RADIUS = 10;
        const BALL_RADIUS = 5;

        class Player {
            constructor(team, role, homeX, homeY, id, totalInLine, indexInLine) {
                this.team = team;        
                this.role = role;        
                this.id = id;
                this.homeX = homeX;      
                this.homeY = homeY;      
                this.x = homeX;
                this.y = homeY;
                
                // Determine horizontal lane alignment (Left, Center, Right) to preserve structural width
                this.lane = 'C'; 
                if (totalInLine > 1) {
                    const pct = indexInLine / (totalInLine - 1);
                    if (pct <= 0.3) this.lane = 'L';
                    else if (pct >= 0.7) this.lane = 'R';
                }

                this.speed = 2.4; 
                this.vX = 0;
                this.vY = 0;
                this.cooldown = 0; 
            }

            update(ball, allPlayers) {
                if (this.cooldown > 0) this.cooldown--;

                const teamInPossession = ball.controllingPlayer ? ball.controllingPlayer.team : ball.lastPossessionTeam;
                const iHaveBall = ball.controllingPlayer === this;
                const opponentGoalY = this.team === 'blue' ? pitch.pad : pitch.height - pitch.pad;
                
                let targetX = this.homeX;
                let targetY = this.homeY;
                const distToBall = Math.hypot(ball.x - this.x, ball.y - this.y);

                if (iHaveBall) {
                    // 1. BALL CARRIER LOGIC
                    const distToGoal = Math.abs(this.y - opponentGoalY);

                    // High Priority: Shoot if close enough
                    if (distToGoal < 160 && Math.abs(this.x - pitch.width/2) < 130) {
                        this.shoot(ball);
                        return;
                    }

                    // Medium Priority: Scan systematically for a tactical pass
                    let passTarget = this.findBestPassOption(allPlayers);
                    if (passTarget) {
                        this.pass(ball, passTarget);
                        return;
                    }

                    // Low Priority: Dribble forward while preserving wide positioning if on the flank
                    targetY = opponentGoalY;
                    if (this.lane === 'L') targetX = Math.max(pitch.pad + 30, this.x - 5);
                    else if (this.lane === 'R') targetX = Math.min(pitch.width - pitch.pad - 30, this.x + 5);
                    else targetX = this.x + (pitch.width/2 - this.x) * 0.1;

                } else {
                    // 2. OFF-BALL POSITIONAL ENGINE
                    if (teamInPossession === this.team) {
                        // ATTACKING TRANSITION: Push forward but stay in native lanes to space the field
                        const attackProgression = (this.team === 'blue') ? (ball.y - pitch.height) * 0.4 : (ball.y * 0.4);
                        targetY = this.homeY + attackProgression;
                        
                        // Spread wide to create passing triangles
                        if (this.lane === 'L') targetX = this.homeX - 25;
                        else if (this.lane === 'R') targetX = this.homeX + 25;
                        else targetX = this.homeX + (ball.x - pitch.width/2) * 0.2;

                        if (this.role === 'D') targetY = this.homeY + (ball.y - this.homeY) * 0.3; // Containment line
                    } else {
                        // DEFENSIVE TRANSITION: Fall back into structure, compress lanes slightly
                        targetY = this.homeY + (ball.y - this.homeY) * 0.5;
                        targetX = this.homeX + (ball.x - pitch.width/2) * 0.15;

                        if (this.role === 'G') {
                            targetX = pitch.width / 2 + (ball.x - pitch.width / 2) * 0.15;
                            targetY = this.homeY;
                        }
                    }

                    // 3. BALL MAGNET PRESS REGULATION
                    // Only press the ball if it enters your immediate zone, or if you are the designated absolute closest player
                    const areaOfResponsibility = (this.role === 'G') ? 60 : 130;
                    
                    if (distToBall < areaOfResponsibility) {
                        const closestTeammate = allPlayers
                            .filter(p => p.team === this.team && p.role !== 'G')
                            .reduce((closest, p) => Math.hypot(ball.x - p.x, ball.y - p.y) < Math.hypot(ball.x - closest.x, ball.y - closest.y) ? p : closest, this);

                        if (closestTeammate === this || distToBall < 50) {
                            targetX = ball.x;
                            targetY = ball.y;
                        }
                    }
                }

                // Smooth Engine Physics Calculations
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dDist = Math.hypot(dx, dy);

                if (dDist > 1) {
                    this.vX = (dx / dDist) * this.speed;
                    this.vY = (dy / dDist) * this.speed;
                } else {
                    this.vX *= 0.2;
                    this.vY *= 0.2;
                }

                this.x += this.vX;
                this.y += this.vY;

                // Enforce boundaries
                this.x = Math.max(pitch.pad + 10, Math.min(pitch.width - pitch.pad - 10, this.x));
                this.y = Math.max(pitch.pad + 10, Math.min(pitch.height - pitch.pad - 10, this.y));

                // Interception calculation
                if (!ball.controllingPlayer && distToBall < PLAYER_RADIUS + BALL_RADIUS && this.cooldown === 0) {
                    ball.controllingPlayer = this;
                    ball.lastPossessionTeam = this.team;
                }
            }

            findBestPassOption(allPlayers) {
                let options = allPlayers.filter(p => p.team === this.team && p !== this);
                let bestOption = null;
                let highestScore = -Infinity;

                options.forEach(p => {
                    const dist = Math.hypot(p.x - this.x, p.y - this.y);
                    
                    // Filter out passes that are unrealistically short or impossibly long
                    if (dist > 50 && dist < 240) {
                        const forwardProgress = this.team === 'blue' ? (this.y - p.y) : (p.y - this.y);
                        const isCross = Math.abs(p.x - this.x) > 120;
                        
                        // Scoring metric: heavily reward forward progression and tactical switches to the opposite wing
                        let score = forwardProgress * 2.0 - dist * 0.1;
                        if (isCross) score += 40; 

                        // Verify safety of the passing lane against active defenders
                        let opponents = allPlayers.filter(o => o.team !== this.team);
                        let pathIntercepted = false;
                        
                        opponents.forEach(o => {
                            const opponentDistToLine = distToSegment({x: o.x, y: o.y}, {x: this.x, y: this.y}, {x: p.x, y: p.y});
                            // If an opponent is within defensive tracking radius of the passing lane line segment
                            if (opponentDistToLine < 28) { 
                                pathIntercepted = true;
                            }
                        });

                        if (!pathIntercepted && score > highestScore) {
                            highestScore = score;
                            bestOption = p;
                        }
                    }
                });
                return bestOption;
            }

            pass(ball, targetPlayer) {
                ball.controllingPlayer = null;
                const dx = targetPlayer.x - this.x;
                const dy = targetPlayer.y - this.y;
                const dist = Math.hypot(dx, dy);
                
                // Crisp passing speeds
                ball.vX = (dx / dist) * 7.5;
                ball.vY = (dy / dist) * 7.5;
                
                this.cooldown = 30; 
                targetPlayer.cooldown = 5;
            }

            shoot(ball) {
                ball.controllingPlayer = null;
                const targetGoalX = pitch.width / 2 + (Math.random() * 30 - 15);
                const targetGoalY = this.team === 'blue' ? pitch.pad : pitch.height - pitch.pad;
                
                const dx = targetGoalX - this.x;
                const dy = targetGoalY - this.y;
                const dist = Math.hypot(dx, dy);

                ball.vX = (dx / dist) * 11.0;
                ball.vY = (dy / dist) * 11.0;
                this.cooldown = 45;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, PLAYER_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = this.team === 'blue' ? '#2980b9' : '#c0392b';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = '9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.role + this.lane, this.x, this.y);
            }
        }

        class Ball {
            constructor() { this.reset(); }
            reset() {
                this.x = pitch.width / 2;
                this.y = pitch.height / 2;
                this.vX = 0;
                this.vY = 0;
                this.controllingPlayer = null;
                this.lastPossessionTeam = lastScored === 'blue' ? 'red' : 'blue';
            }
            update() {
                if (this.controllingPlayer) {
                    const offset = this.controllingPlayer.team === 'blue' ? -8 : 8;
                    this.x = this.controllingPlayer.x;
                    this.y = this.controllingPlayer.y + offset;
                    this.vX = 0;
                    this.vY = 0;
                } else {
                    this.x += this.vX;
                    this.y += this.vY;
                    this.vX *= 0.975; // Ball friction roll
                    this.vY *= 0.975;

                    if (this.x <= pitch.pad + BALL_RADIUS || this.x >= pitch.width - pitch.pad - BALL_RADIUS) {
                        this.vX *= -1;
                        this.x = this.x <= pitch.pad + BALL_RADIUS ? pitch.pad + BALL_RADIUS : pitch.width - pitch.pad - BALL_RADIUS;
                    }

                    if (this.y <= pitch.pad || this.y >= pitch.height - pitch.pad) {
                        const goalLeft = pitch.width / 2 - 45;
                        const goalRight = pitch.width / 2 + 45;

                        if (this.x > goalLeft && this.x < goalRight) {
                            if (this.y <= pitch.pad) blueScore++;
                            else redScore++;
                            lastScored = this.y <= pitch.pad ? 'blue' : 'red';
                            updateScoreboard();
                            resetPositions();
                        } else {
                            this.vY *= -1;
                            this.y = this.y <= pitch.pad ? pitch.pad + 5 : pitch.height - pitch.pad - 5;
                            this.vX += (Math.random() * 2 - 1);
                        }
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        let players = [];
        const ball = new Ball();

        function sqr(x) { return x * x; }
        function dist2(v, w) { return sqr(v.x - w.x) + sqr(v.y - w.y); }
        function distToSegmentSquared(p, v, w) {
            let l2 = dist2(v, w);
            if (l2 == 0) return dist2(p, v);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return dist2(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
        }
        function distToSegment(p, v, w) { return Math.sqrt(distToSegmentSquared(p, v, w)); }

        function buildTeamFromFormation(team, formationString) {
            const teamPlayers = [];
            const parts = formationString.split('-').map(Number);
            const totalOutfield = parts.reduce((a, b) => a + b, 0);

            if (totalOutfield !== 10 || parts.some(isNaN)) {
                alert(`Invalid format: "${formationString}". Set fields to sum up to 10.`);
                return null;
            }

            const isBlue = team === 'blue';
            const usableHeight = (pitch.height / 2) - pitch.pad - 40;
            
            const gkY = isBlue ? pitch.height - pitch.pad - 15 : pitch.pad + 15;
            teamPlayers.push(new Player(team, 'G', pitch.width / 2, gkY, 1, 1, 0));

            let currentId = 2;
            parts.forEach((lineCount, lineIndex) => {
                let progressFraction = lineIndex / (parts.length - 1);
                let rowY;
                if (isBlue) {
                    rowY = (pitch.height / 2) + 40 + (1 - progressFraction) * usableHeight;
                } else {
                    rowY = pitch.pad + 40 + progressFraction * usableHeight;
                }

                let role = 'M';
                if (lineIndex === 0) role = 'D';
                else if (lineIndex === parts.length - 1) role = 'A';

                for (let i = 0; i < lineCount; i++) {
                    let horizontalFraction = lineCount === 1 ? 0.5 : i / (lineCount - 1);
                    let paddingX = 50; 
                    let rowX = paddingX + horizontalFraction * (pitch.width - paddingX * 2);

                    teamPlayers.push(new Player(team, role, rowX, rowY, currentId++, lineCount, i));
                }
            });

            return teamPlayers;
        }

        function parseFormations() {
            const blueStr = document.getElementById('blueFormation').value.trim();
            const redStr = document.getElementById('redFormation').value.trim();
            const blueSet = buildTeamFromFormation('blue', blueStr);
            const redSet = buildTeamFromFormation('red', redStr);
            if (blueSet && redSet) {
                players = [...blueSet, ...redSet];
                ball.reset();
            }
        }

        function resetPositions() {
            ball.reset();
            const blueStr = document.getElementById('blueFormation').value.trim();
            const redStr = document.getElementById('redFormation').value.trim();
            const blueSet = buildTeamFromFormation('blue', blueStr);
            const redSet = buildTeamFromFormation('red', redStr);
            if (blueSet && redSet) players = [...blueSet, ...redSet];
        }

        function updateScoreboard() {
            scoreboard.innerText = `Blue ${blueScore} - ${redScore} Red`;
        }

        function drawPitch() {
            ctx.fillStyle = pitch.grassColor;
            ctx.fillRect(0, 0, pitch.width, pitch.height);
            ctx.fillStyle = pitch.grassStreak;
            for (let i = pitch.pad; i < pitch.height - pitch.pad; i += 60) {
                if ((i / 60) % 2 === 0) {
                    ctx.fillRect(pitch.pad, i, pitch.width - pitch.pad * 2, Math.min(30, pitch.height - pitch.pad - i));
                }
            }
            ctx.strokeStyle = pitch.lineColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(pitch.pad, pitch.pad, pitch.width - pitch.pad * 2, pitch.height - pitch.pad * 2);
            ctx.beginPath();
            ctx.moveTo(pitch.pad, pitch.height / 2);
            ctx.lineTo(pitch.width - pitch.pad, pitch.height / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(pitch.width / 2, pitch.height / 2, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeRect(pitch.width / 2 - 80, pitch.pad, 160, 70);
            ctx.strokeRect(pitch.width / 2 - 35, pitch.pad, 70, 25);
            ctx.strokeRect(pitch.width / 2 - 80, pitch.height - pitch.pad - 70, 160, 70);
            ctx.strokeRect(pitch.width / 2 - 35, pitch.height - pitch.pad - 25, 70, 25);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.strokeRect(pitch.width / 2 - 25, pitch.pad - 8, 50, 8);
            ctx.strokeRect(pitch.width / 2 - 25, pitch.height - pitch.pad, 50, 8);
        }

        function simulationStep() {
            if (!isSimulating) return;
            players.forEach(p => p.update(ball, players));
            ball.update();
            ctx.clearRect(0, 0, pitch.width, pitch.height);
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
            animationFrameId = requestAnimationFrame(simulationStep);
        }

        simulateBtn.addEventListener('click', () => {
            if (!isSimulating) {
                parseFormations();
                isSimulating = true;
                simulateBtn.innerText = "Pause Simulation";
                simulateBtn.classList.add('active');
                simulationStep();
            } else {
                isSimulating = false;
                simulateBtn.innerText = "Simulate Match";
                simulateBtn.classList.remove('active');
                cancelAnimationFrame(animationFrameId);
            }
        });

        resetBtn.addEventListener('click', () => {
            isSimulating = false;
            simulateBtn.innerText = "Simulate Match";
            simulateBtn.classList.remove('active');
            cancelAnimationFrame(animationFrameId);
            blueScore = 0;
            redScore = 0;
            lastScored = null;
            updateScoreboard();
            parseFormations();
            ctx.clearRect(0, 0, pitch.width, pitch.height);
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
        });

        window.onload = () => {
            parseFormations();
            drawPitch();
            players.forEach(p => p.draw());
            ball.draw();
        };
    </script>
</body>
</html>
